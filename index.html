<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANKLEBREAK</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* PRELOADER */
#preloader{
position:fixed;width:100%;height:100vh;background:black;
display:flex;justify-content:center;align-items:center;
flex-direction:column;z-index:9999;
}
#preloader img{width:140px;max-width:80%;}

/* HERO */
.hero{
height:100vh;display:flex;justify-content:center;align-items:center;
flex-direction:column;text-align:center;background-size:cover;
background-position:center center;background-repeat:no-repeat;
transition:opacity 0.8s ease-in-out;
padding:0 20px;
}
.hero h1{font-size:70px;font-weight:900;letter-spacing:6px;}
.countdown{margin-top:25px;font-size:28px;font-weight:600;}

/* PRODUCTS */
.products{
padding:80px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}
.card{
background:#111;padding:25px;border-radius:20px;transition:0.3s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(255,255,255,0.15);
}
.price{margin-top:10px;font-weight:600;font-size:18px;}
.stock{margin-top:10px;animation:glow 1.5s infinite alternate;}
@keyframes glow{from{opacity:0.4;}to{opacity:1;}}
button{
margin-top:15px;padding:10px;background:white;
border:none;cursor:pointer;font-weight:600;width:100%;
}

/* CART */
.cart{
position:fixed;right:20px;bottom:20px;background:#111;
padding:20px;border-radius:20px;width:260px;
box-shadow:0 0 20px rgba(255,255,255,0.1);
z-index:1000;
}
.cart input{
width:100%;padding:8px;margin-top:10px;
background:#222;border:none;color:white;
}

/* MUSIC PLAYER */
.music-player{
position:fixed;left:20px;bottom:260px;background:#111;
padding:20px;border-radius:20px;text-align:center;width:190px;
box-shadow:0 0 20px rgba(255,255,255,0.1);z-index:1000;
}
.music-player button{
margin-top:10px;padding:8px 20px;background:white;
border:none;cursor:pointer;font-weight:600;width:100%;
}
.vinyl{
width:60px;height:60px;margin:auto;border-radius:50%;
background:radial-gradient(circle,#444 20%,#000 60%);
animation:spin 4s linear infinite;animation-play-state:paused;
}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* MODAL */
.modal{
display:none;position:fixed;z-index:2000;left:0;top:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;align-items:center;
padding:20px;
}
.modal-content{
background:#111;padding:40px;border-radius:20px;
width:100%;max-width:400px;text-align:center;
position:relative;animation:fadeIn 0.3s ease-in-out;
}
@keyframes fadeIn{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}
.modal-logo{width:100px;margin-bottom:20px;max-width:60%;}
.modal-total{margin-top:20px;font-size:20px;font-weight:600;}
.kaspi{margin-top:20px;opacity:0.8;}
.close{
position:absolute;right:20px;top:15px;
font-size:28px;cursor:pointer;
}

footer{text-align:center;padding:40px;opacity:0.5;}

/* ========================= */
/* 📱 MOBILE ADAPTATION */
/* ========================= */

@media (max-width: 768px){

.hero h1{
font-size:36px;
letter-spacing:3px;
}

.countdown{
font-size:18px;
}

.products{
padding:40px 20px;
gap:20px;
}

.card{
padding:18px;
}

.cart{
width:90%;
right:5%;
bottom:15px;
}

.music-player{
width:90%;
left:5%;
bottom:180px;
}

.modal-content{
padding:25px;
}

}

@media (max-width: 480px){

.hero h1{
font-size:28px;
}

.countdown{
font-size:16px;
}

button{
padding:12px;
font-size:14px;
}

.cart{
font-size:14px;
}

}

</style>
</head>
<body>
