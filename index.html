<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANKLEBREAK</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* BURGER */
.burger{
position:fixed;top:20px;left:20px;
font-size:30px;cursor:pointer;z-index:3000;
}
.side-menu{
position:fixed;top:0;left:-250px;
width:250px;height:100vh;
background:#111;padding:40px 20px;
transition:0.3s;z-index:2500;
}
.side-menu a{
display:block;color:white;
text-decoration:none;margin:20px 0;
font-weight:600;
}
.side-menu.open{left:0;}

/* HERO */
.hero{
height:100vh;display:flex;justify-content:center;align-items:center;
flex-direction:column;text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url("images/bg1.jpg");
background-size:cover;background-position:center;
padding:0 20px;
}
.hero h1{font-size:60px;font-weight:900;letter-spacing:6px;}
.countdown{margin-top:20px;font-size:24px;font-weight:600;}

/* PRODUCTS */
.products{
padding:60px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}
.card{
background:#111;padding:20px;border-radius:20px;
}
.price{margin-top:10px;font-weight:600;}
.stock{margin-top:10px;font-size:14px;}

.sizes{
margin-top:15px;
display:flex;flex-wrap:wrap;gap:8px;
}
.size-btn{
padding:6px 10px;background:#222;
border:1px solid #444;color:white;
cursor:pointer;font-size:12px;
}
.size-btn.active{background:white;color:black;}

button{
margin-top:15px;padding:10px;background:white;
border:none;cursor:pointer;font-weight:600;width:100%;
}

/* CART */
.cart{
position:fixed;right:20px;bottom:20px;background:#111;
padding:20px;border-radius:20px;width:280px;
box-shadow:0 0 20px rgba(255,255,255,0.1);
}
.cart-item{
display:flex;justify-content:space-between;
align-items:center;margin-top:10px;font-size:14px;
}
.remove-btn{
background:red;border:none;color:white;
padding:3px 6px;cursor:pointer;font-size:12px;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:32px;}
.products{padding:40px 20px;}
.cart{width:90%;right:5%;}
}
</style>
</head>
<body>

<div class="burger" onclick="toggleMenu()">☰</div>
<div class="side-menu" id="sideMenu">
<a href="#" onclick="alert('Instagram: @anklebreak.kz')">Контакты</a>
<a href="#" onclick="alert('WhatsApp: +7-705-303-84-27')">WhatsApp</a>
</div>

<section class="hero">
<h1>ANKLEBREAK.KZ</h1>
<div class="countdown" id="countdown"></div>
</section>

<section class="products">

<div class="card">
<h3>Худи Suvene</h3>
<p class="price">9 990 ₸</p>
<p class="stock">Осталось 2 шт</p>
<div class="sizes">
<button class="size-btn" onclick="selectSize(this)">S</button>
<button class="size-btn" onclick="selectSize(this)">M</button>
<button class="size-btn" onclick="selectSize(this)">L</button>
<button class="size-btn" onclick="selectSize(this)">XL</button>
<button class="size-btn" onclick="selectSize(this)">2XL</button>
</div>
<button onclick="addToCart(this,'Худи Suvene',9990)">Добавить</button>
</div>

<div class="card">
<h3>Штаны Suvene</h3>
<p class="price">8 990 ₸</p>
<p class="stock">Осталось 5 шт</p>
<div class="sizes">
<button class="size-btn" onclick="selectSize(this)">S</button>
<button class="size-btn" onclick="selectSize(this)">M</button>
<button class="size-btn" onclick="selectSize(this)">L</button>
<button class="size-btn" onclick="selectSize(this)">XL</button>
<button class="size-btn" onclick="selectSize(this)">2XL</button>
</div>
<button onclick="addToCart(this,'Штаны Suvene',8990)">Добавить</button>
</div>

</section>

<div class="cart" id="cart">
<h3>Корзина</h3>
<div id="cartItems"></div>
<p>Сумма: <span id="total">0</span> ₸</p>
</div>

<script>
let total=0;
let cartItems=[];

function selectSize(btn){
let parent=btn.parentElement;
parent.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function addToCart(button,name,price){
let card=button.parentElement;
let selectedSize=card.querySelector(".size-btn.active");
if(!selectedSize){
alert("Выберите размер");
return;
}
let size=selectedSize.innerText;
cartItems.push({name,price,size});
total+=price;
renderCart();
}

function renderCart(){
let html="";
cartItems.forEach((item,index)=>{
html+=`
<div class="cart-item">
<span>${item.name} (${item.size})</span>
<button class="remove-btn" onclick="removeItem(${index})">X</button>
</div>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function removeItem(index){
total-=cartItems[index].price;
cartItems.splice(index,1);
renderCart();
}

function toggleMenu(){
document.getElementById("sideMenu").classList.toggle("open");
}

/* COUNTDOWN */
const dropDate=new Date("March 11, 2026 20:00:00").getTime();
setInterval(()=>{
const now=new Date().getTime();
const distance=dropDate-now;
if(distance<0){
document.getElementById("countdown").innerHTML="DROP LIVE 🔥";
return;
}
const d=Math.floor(distance/(1000*60*60*24));
const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((distance%(1000*60*60))/(1000*60));
const s=Math.floor((distance%(1000*60))/1000);
document.getElementById("countdown").innerHTML=
"DROP через: "+d+"д "+h+"ч "+m+"м "+s+"с";
},1000);
</script>

</body>
</html>
