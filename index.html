<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANKLEBREAK</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background:black;color:white;overflow-x:hidden;}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
overflow:hidden;
padding:0 20px;
}

.hero-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:opacity 1.5s ease-in-out;
z-index:-2;
}

.hero-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.hero h1{font-size:60px;font-weight:900;letter-spacing:6px;}
.countdown{margin-top:20px;font-size:22px;}

/* PRODUCTS */
.products{
padding:60px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.price{font-weight:600;}
.stock{font-size:14px;opacity:0.8;}

.size-row{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.size-btn{
flex:1;
min-width:40px;
padding:6px 0;
background:#1c1c1c;
border:1px solid #333;
color:white;
font-size:12px;
cursor:pointer;
border-radius:6px;
}

.size-btn.active{
background:white;
color:black;
}

button{
padding:10px;
background:white;
border:none;
cursor:pointer;
font-weight:600;
border-radius:6px;
}

/* CART */
.cart{
position:fixed;
right:20px;
bottom:20px;
background:#111;
padding:20px;
border-radius:20px;
width:280px;
box-shadow:0 0 20px rgba(255,255,255,0.1);
z-index:1000;
}

.cart-item{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:8px;
}

.remove-btn{
background:red;
border:none;
color:white;
padding:2px 6px;
font-size:12px;
cursor:pointer;
border-radius:4px;
}

.cart input{
width:100%;
margin-top:10px;
padding:6px;
background:#222;
border:none;
color:white;
}

/* MUSIC */
.music-player{
position:fixed;
left:20px;
bottom:260px;
background:#111;
padding:15px;
border-radius:20px;
width:190px;
text-align:center;
z-index:1000;
}

.music-player button{
margin-top:10px;
width:100%;
}

.vinyl{
width:60px;height:60px;
margin:auto;
border-radius:50%;
background:radial-gradient(circle,#444 20%,#000 60%);
animation:spin 4s linear infinite;
animation-play-state:paused;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){

body{
padding-bottom:70px;
}

/* HERO */
.hero{
height:70vh;
}

/* PRODUCTS */
.products{
padding:30px 15px;
}

/* CART — скрыта по умолчанию */
.cart{
position:fixed;
left:0;
right:0;
bottom:-100%;
width:100%;
height:60vh;
border-radius:20px 20px 0 0;
transition:0.4s ease;
overflow-y:auto;
}

/* Когда активна */
.cart.active{
bottom:0;
}

/* Кнопка корзины */
.cart-toggle{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:white;
color:black;
padding:15px;
border-radius:15px;
text-align:center;
font-weight:600;
z-index:1500;
}

/* MUSIC — маленькая и выше */
.music-player{
position:fixed;
top:10px;
right:10px;
left:auto;
bottom:auto;
width:120px;
padding:8px;
}

.vinyl{
width:35px;
height:35px;
}

/* MODAL */
.modal-content{
width:100%;
height:100%;
max-width:none;
border-radius:0;
}

}
</style>
</head>
<body>

<section class="hero" id="hero">
<div class="hero-bg" id="heroBg"></div>
<div class="hero-overlay"></div>
<h1>ANKLEBREAK.KZ</h1>
<div class="countdown" id="countdown"></div>
</section>

<section class="products">

<div class="card">
<h3>Худи Suvene</h3>
<p class="price">9 990 ₸</p>
<p class="stock">Осталось 2 шт</p>

<div class="size-row">
<button class="size-btn" onclick="selectSize(this)">S</button>
<button class="size-btn" onclick="selectSize(this)">M</button>
<button class="size-btn" onclick="selectSize(this)">L</button>
<button class="size-btn" onclick="selectSize(this)">XL</button>
<button class="size-btn" onclick="selectSize(this)">2XL</button>
</div>

<button onclick="addToCart(this,'Худи Suvene',9990)">Добавить</button>
</div>

<div class="card">
<h3>Штаны Suvene</h3>
<p class="price">8 990 ₸</p>
<p class="stock">Осталось 2 шт</p>

<div class="size-row">
<button class="size-btn" onclick="selectSize(this)">S</button>
<button class="size-btn" onclick="selectSize(this)">M</button>
<button class="size-btn" onclick="selectSize(this)">L</button>
<button class="size-btn" onclick="selectSize(this)">XL</button>
<button class="size-btn" onclick="selectSize(this)">2XL</button>
</div>

<button onclick="addToCart(this,'Штаны Suvene',8990)">Добавить</button>
</div>

</section>

<div class="cart">
<h3>Корзина</h3>
<div id="cartItems"></div>
<p>Сумма: <span id="total">0</span> ₸</p>
<input type="text" id="promo" placeholder="Промокод">
<button onclick="applyPromo()">Применить</button>
<button onclick="openCheckout()">Оформить заказ</button>
</div>

<div class="music-player">
<div class="vinyl" id="vinyl"></div>
<button onclick="toggleMusic()" id="musicBtn">Включить</button>
<p id="nowPlaying">Музыка выключена</p>
</div>
<audio id="bgMusic"></audio>

<div class="modal" id="checkoutModal">
<div class="modal-content">
<span class="close" onclick="closeCheckout()">×</span>
<h2>Ваш заказ</h2>

<div id="orderList"></div>
<p>Итого: <span id="modalTotal"></span> ₸</p>

<hr style="margin:20px 0;border:1px solid #333;">

<h3>Оплата</h3>
<p>Перевод через Kaspi</p>
<p style="font-weight:600;margin-top:10px;">
Номер: +7 705 303 8427 
Нұржан Ш.
</p>
<p style="font-size:13px;opacity:0.7;margin-top:10px;">
После оплаты отправьте чек и скриншот заказа на WhatsApp
</p>
</div>
</div>

<script>

/* BACKGROUND FADE */
const images=["images/bg1.jpg","images/bg2.jpg","images/bg3.jpg"];
let currentBg=0;
const bg=document.getElementById("heroBg");

function changeBackground(){
bg.style.opacity=0;
setTimeout(()=>{
bg.style.backgroundImage=`url(${images[currentBg]})`;
bg.style.opacity=1;
currentBg=(currentBg+1)%images.length;
},800);
}
changeBackground();
setInterval(changeBackground,5000);

/* COUNTDOWN */
const dropDate=new Date("March 11, 2026 20:00:00").getTime();
setInterval(()=>{
const now=new Date().getTime();
const distance=dropDate-now;
if(distance<0){
document.getElementById("countdown").innerHTML="DROP LIVE 🔥";
return;
}
const d=Math.floor(distance/(1000*60*60*24));
const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((distance%(1000*60*60))/(1000*60));
const s=Math.floor((distance%(1000*60))/1000);
document.getElementById("countdown").innerHTML=
`DROP через: ${d}д ${h}ч ${m}м ${s}с`;
},1000);

/* CART */
let total=0;
let promoUsed=false;
let cartItems=[];

function selectSize(btn){
let parent=btn.parentElement;
parent.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function addToCart(button,name,price){
let card=button.parentElement;
let selectedSize=card.querySelector(".size-btn.active");
if(!selectedSize){alert("Выберите размер");return;}
let size=selectedSize.innerText;
cartItems.push({name,price,size});
total+=price;
renderCart();
}

function renderCart(){
let html="";
cartItems.forEach((item,index)=>{
html+=`
<div class="cart-item">
<span>${item.name} (${item.size})</span>
<button class="remove-btn" onclick="removeItem(${index})">X</button>
</div>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function removeItem(index){
total-=cartItems[index].price;
cartItems.splice(index,1);
renderCart();
}

function applyPromo(){
let code=document.getElementById("promo").value;
if(code==="SHARIP" && !promoUsed){
total=Math.floor(total*0.9);
promoUsed=true;
renderCart();
alert("Промокод применён (-10%)");
}else if(promoUsed){
alert("Промокод уже использован");
}else{
alert("Неверный промокод");
}
}

function openCheckout(){
if(cartItems.length===0){alert("Корзина пуста");return;}
document.getElementById("checkoutModal").style.display="flex";
let html="";
cartItems.forEach(item=>{
html+=`<p>${item.name} (${item.size}) — ${item.price} ₸</p>`;
});
document.getElementById("orderList").innerHTML=html;
document.getElementById("modalTotal").innerText=total;
}

function closeCheckout(){
document.getElementById("checkoutModal").style.display="none";
}

/* MUSIC */
const tracks=["audio/track1.mp3","audio/track2.mp3"];
let currentTrack=0;
let isPlaying=false;
const audio=document.getElementById("bgMusic");
const vinyl=document.getElementById("vinyl");
const btn=document.getElementById("musicBtn");

function toggleMusic(){
if(!isPlaying){
audio.src=tracks[currentTrack];
audio.play();
vinyl.style.animationPlayState="running";
btn.innerText="Пауза";
isPlaying=true;
}else{
audio.pause();
vinyl.style.animationPlayState="paused";
btn.innerText="Включить";
isPlaying=false;
}
}
</script>

</body>
</html>
